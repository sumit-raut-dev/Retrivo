<div class="min-h-screen w-full bg-background flex items-center justify-center px-6 text-foreground font-sans">
    <div class="w-full max-w-md">
        <div class="bg-card border border-border rounded-2xl p-8 shadow-lg">
            <div class="flex flex-col items-center text-center mb-6">
                <div
                    class="w-14 h-14 rounded-xl bg-gradient-to-tr from-primary to-ring flex items-center justify-center mb-4">
                    <iconify-icon icon="lucide:map-pin" class="text-2xl text-white"></iconify-icon>
                </div>
                <h1 class="text-xl font-bold">Create account</h1>
                <p class="text-xs text-muted-foreground mt-1">Sign up to report and track items</p>
            </div>

            <form (ngSubmit)="submit()" class="space-y-4">
                <div>
                    <label
                        class="block text-[10px] uppercase tracking-wider font-semibold text-muted-foreground mb-1.5">Full
                        name</label>
                    <input type="text" [(ngModel)]="fullName" name="fullName" placeholder="Enter your full name"
                        class="w-full bg-muted border border-border rounded-lg px-4 py-3 text-xs focus:outline-none focus:border-primary transition-colors"
                        required />
                </div>
                <div>
                    <label
                        class="block text-[10px] uppercase tracking-wider font-semibold text-muted-foreground mb-1.5">Email</label>
                    <input type="email" [(ngModel)]="email" name="email" placeholder="Enter your email"
                        class="w-full bg-muted border border-border rounded-lg px-4 py-3 text-xs focus:outline-none focus:border-primary transition-colors"
                        required />
                </div>
                <div>
                    <label
                        class="block text-[10px] uppercase tracking-wider font-semibold text-muted-foreground mb-1.5">Password</label>
                    <div class="relative">
                        <input [type]="showPassword() ? 'text' : 'password'" [(ngModel)]="password" name="password"
                            placeholder="Create a password"
                            class="w-full bg-muted border border-border rounded-lg px-4 py-3 pr-10 text-xs focus:outline-none focus:border-primary transition-colors"
                            required />
                        <button type="button" (click)="showPassword.set(!showPassword())"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-muted-foreground hover:text-foreground transition-colors">
                            <iconify-icon [icon]="showPassword() ? 'lucide:eye-off' : 'lucide:eye'"
                                class="text-sm"></iconify-icon>
                        </button>
                    </div>
                </div>
                <div>
                    <label
                        class="block text-[10px] uppercase tracking-wider font-semibold text-muted-foreground mb-1.5">Phone
                        (optional)</label>
                    <input type="tel" [(ngModel)]="phone" name="phone" placeholder="Enter your phone number"
                        class="w-full bg-muted border border-border rounded-lg px-4 py-3 text-xs focus:outline-none focus:border-primary transition-colors" />
                </div>

                <p *ngIf="errorMessage()" class="text-xs text-rose-400">{{ errorMessage() }}</p>

                <button type="submit" [disabled]="submitting()"
                    class="w-full py-3 rounded-lg bg-gradient-to-r from-primary to-ring text-white font-semibold text-xs hover:opacity-90 transition-opacity shadow-md shadow-primary/20 disabled:opacity-50">
                    {{ submitting() ? 'Creating account…' : 'Sign up' }}
                </button>
            </form>

            <div class="flex items-center gap-3 my-5">
                <div class="flex-1 border-t border-border"></div>
                <span class="text-[10px] text-muted-foreground uppercase tracking-wider">Or</span>
                <div class="flex-1 border-t border-border"></div>
            </div>

            <div #googleBtn class="flex justify-center"></div>

            <p class="text-center text-xs text-muted-foreground mt-5">
                Already have an account? <a routerLink="/login" class="text-primary hover:opacity-80">Sign in</a>
            </p>
        </div>
    </div>
</div>
