        </div>
        <span class="text-lg font-bold tracking-tight">Retrivo</span>
      </div>
      <p class="text-xs text-muted-foreground leading-relaxed">Helping students recover their belongings on campus.</p>

        <li><a routerLink="/report-item" [queryParams]="{ type: 'Lost' }" class="hover:text-primary transition-colors">Report lost item</a></li>

    <div>

  </div>
  <div class="max-w-6xl mx-auto pt-8 border-t border-border/40 flex flex-col sm:flex-row items-center justify-between gap-4 text-xs text-muted-foreground">
